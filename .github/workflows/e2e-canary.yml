name: E2E Canary (latest upstream deps)

# Early-warning canary: runs the full E2E suite against the *latest* of each externally-released
# dependency we fetch at runtime — Mealie, Firefox, and Google Chrome — on a schedule, so upstream
# releases that break the extension surface here BEFORE they reach the pinned PR gate.
# Non-blocking: a red run is a heads-up, not a merge block.
#
# One matrix leg per moving dependency, holding the others pinned, so a red leg names the culprit
# (an "all latest at once" run couldn't tell you whether Mealie, Firefox, or Chrome broke).
#
# chrome-latest keeps Playwright pinned and drives installed Google Chrome stable via
# PLAYWRIGHT_CHROME_CHANNEL=chrome (not `playwright install chromium@latest`, which fights
# Playwright's bundled-browser pairing). A smoke step launches that Chrome with no extension
# first: smoke fail → Playwright↔Chrome/tooling; smoke pass + suite fail → product/Chrome-behavior.
#
# The firefox-latest leg sets firefox_version so e2e.yml skips its chrome job (Chrome ignores
# FIREFOX_VER). The chrome-latest leg sets chrome_channel so e2e.yml skips its firefox job
# (Firefox ignores PLAYWRIGHT_CHROME_CHANNEL).
#
# Note: `schedule` only fires from the repository's default branch. Until this is on the default
# branch, run it manually via "Run workflow" (workflow_dispatch).

on:
    schedule:
        # Weekly, Mondays 06:00 UTC. Mealie and Firefox release roughly monthly, so weekly is
        # plenty; bump to a daily cron if you want faster signal.
        - cron: '0 6 * * 1'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    canary:
        name: ${{ matrix.name }}
        strategy:
            # Don't let one red leg cancel the others — we want signal from each.
            fail-fast: false
            matrix:
                include:
                    # Mealie :latest, Firefox + Chromium pinned.
                    - name: mealie-latest
                      mealie_image: ghcr.io/mealie-recipes/mealie:latest
                      firefox_version: ''
                      chrome_channel: ''
                    # Firefox latest, Mealie + Chromium pinned. (Also surfaces geckodriver/Firefox
                    # incompatibilities, since a newer Firefox is what breaks the pinned driver.)
                    - name: firefox-latest
                      mealie_image: ''
                      firefox_version: latest
                      chrome_channel: ''
                    # Google Chrome stable, Mealie + Firefox pinned. Playwright stays pinned.
                    - name: chrome-latest
                      mealie_image: ''
                      firefox_version: ''
                      chrome_channel: chrome
        uses: ./.github/workflows/e2e.yml
        with:
            mealie_image: ${{ matrix.mealie_image }}
            firefox_version: ${{ matrix.firefox_version }}
            chrome_channel: ${{ matrix.chrome_channel }}
